<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5 text-center">

    <h2>📝 To-Do List</h2>

    <input type="text" id="taskInput" class="form-control w-50 mx-auto my-3" placeholder="Enter task">

    <button class="btn btn-primary" onclick="addTask()">Add Task</button>

    <ul id="taskList" class="list-group mt-4"></ul>

</div>

<script>

let tasks = [];

function renderTasks() {
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((task, index) => {
        list.innerHTML += `
            <li class="list-group-item d-flex justify-content-between">
                ${task}
                <div>
                    <button class="btn btn-sm btn-warning" onclick="editTask(${index})">Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteTask(${index})">Delete</button>
                </div>
            </li>
        `;
    });
}

function addTask() {
    let input = document.getElementById("taskInput");

    if (input.value === "") return;

    tasks.push(input.value);
    input.value = "";

    renderTasks();
}

function deleteTask(index) {
    tasks.splice(index, 1);
    renderTasks();
}

function editTask(index) {
    let newTask = prompt("Edit task:", tasks[index]);

    if (newTask !== null) {
        tasks[index] = newTask;
        renderTasks();
    }
}

</script>

</body>
</html>
