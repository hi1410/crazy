<!DOCTYPE html>
<html>
<head>
    <title>Facebook Clone</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>

<body style="background:#f0f2f5;">

<!-- TOP NAVBAR -->
<nav class="navbar navbar-dark" style="background:#3b5998;">
    <span class="navbar-brand mb-0 h1">facebook</span>

    <form class="form-inline">
        <input class="form-control mr-2" type="text" placeholder="Email">
        <input class="form-control mr-2" type="password" placeholder="Password">
        <button class="btn btn-light">Login</button>
    </form>
</nav>

<!-- MAIN CONTENT -->
<div class="container mt-5">
    <div class="row">

        <!-- LEFT SIDE -->
        <div class="col-md-6">
            <h3>Facebook helps you connect and share with people in your life.</h3>
            <img src="https://picsum.photos/500/250" class="img-fluid mt-3">
        </div>

        <!-- RIGHT SIDE -->
        <div class="col-md-6">

            <h2>Create an Account</h2>
            <p>It's free and always will be.</p>

            <form>

                <div class="form-row">
                    <div class="col">
                        <input type="text" class="form-control mb-2" placeholder="First name">
                    </div>
                    <div class="col">
                        <input type="text" class="form-control mb-2" placeholder="Surname">
                    </div>
                </div>

                <input type="text" class="form-control mb-2" placeholder="Mobile number or email">
                <input type="password" class="form-control mb-2" placeholder="New password">

                <label>Date of Birth</label>
                <input type="date" class="form-control mb-2">

                <label>Gender</label><br>
                <input type="radio" name="g"> Male
                <input type="radio" name="g"> Female

                <br><br>

                <button class="btn btn-success btn-block">Sign Up</button>

            </form>

        </div>

    </div>
</div>

</body>
</html>
