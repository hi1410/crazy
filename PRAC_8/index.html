<!DOCTYPE html>
<html>
<head>
    <title>Event Registration</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Bootstrap JS (for tooltip) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">🎉 Event Registration Form</h2>

    <form class="needs-validation" novalidate>

        <!-- NAME -->
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="name" placeholder="Name" required>
            <label for="name">Full Name</label>
            <div class="invalid-feedback">Please enter your name</div>
        </div>

        <!-- EMAIL -->
        <div class="form-floating mb-3">
            <input type="email" class="form-control" id="email" placeholder="Email" required>
            <label for="email">Email address</label>
            <div class="invalid-feedback">Enter valid email</div>
        </div>

        <!-- PHONE -->
        <div class="form-floating mb-3">
            <input type="number" class="form-control" id="phone" placeholder="Phone" required>
            <label for="phone">Mobile Number</label>
            <div class="invalid-feedback">Enter phone number</div>
        </div>

        <!-- TOOLTIP -->
        <div class="mb-3">
            <input type="text" class="form-control" placeholder="City"
                data-bs-toggle="tooltip" title="Enter your city name">
        </div>

        <!-- GENDER -->
        <div class="mb-3">
            <label>Gender:</label><br>
            <input type="radio" name="g" required> Male
            <input type="radio" name="g"> Female
        </div>

        <!-- BUTTON -->
        <button class="btn btn-primary w-100" type="submit">Register</button>

    </form>

</div>

<!-- VALIDATION SCRIPT -->
<script>
(() => {
    'use strict';
    const forms = document.querySelectorAll('.needs-validation');

    Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {
            if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
            }
            form.classList.add('was-validated');
        }, false);
    });
})();

// TOOLTIP INIT
var tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
tooltipTriggerList.forEach(t => new bootstrap.Tooltip(t));
</script>

</body>
</html>
